spring.application.name=virtual-office-system

spring.datasource.url=jdbc:h2:file:./data/office_db;DB_CLOSE_ON_EXIT=FALSE;AUTO_RECONNECT=TRUE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=true
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB
# Render/Railway set PORT; default 8080 for local runs.
server.port=${PORT:8080}
# Where the static HTML lives (OAuth success/error redirects here). 
# When merged, this is the same as the backend URL.
app.frontend-base-url=${RENDER_EXTERNAL_URL:${APP_FRONTEND_BASE_URL:http://localhost:8080}}

spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${SPRING_MAIL_USERNAME}
spring.mail.password=${SPRING_MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.requires=true
spring.mail.properties.mail.smtp.starttls.required=true

spring.mail.properties.mail.smtp.ssl.trust=smtp.gmail.com
# OAuth Registration
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.github.client-id=${GITHUB_CLIENT_ID}
spring.security.oauth2.client.registration.github.client-secret=${GITHUB_CLIENT_SECRET}

# AI Assistant
app.ai.openrouter-api-key=${OPENROUTER_API_KEY}
app.ai.openrouter-model=${OPENROUTER_MODEL:z-ai/glm-4.5-air:free}

# ZEGOCLOUD Video Calls
zegocloud.app-id=${ZEGOCLOUD_APP_ID}
zegocloud.server-secret=${ZEGOCLOUD_SERVER_SECRET}
