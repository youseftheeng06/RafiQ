spring.application.name=virtual-office-system

spring.datasource.url=jdbc:h2:file:./data/office_db;DB_CLOSE_ON_EXIT=FALSE;AUTO_RECONNECT=TRUE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB
# Render/Railway set PORT; default 8080 for local runs.
server.port=${PORT:8080}
# Where the static HTML lives (OAuth success/error redirects here). 
# When merged, this is the same as the backend URL.
app.frontend-base-url=${RENDER_EXTERNAL_URL:${APP_FRONTEND_BASE_URL:http://localhost:8080}}

