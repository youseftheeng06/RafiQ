spring.application.name=virtual-office-system

spring.datasource.driverClassName=org.postgresql.Driver
spring.datasource.url=jdbc:postgresql://${PGHOST:localhost}:${PGPORT:5432}/${PGDATABASE:rafiq}
spring.datasource.username=${PGUSER:postgres}
spring.datasource.password=${PGPASSWORD:}
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.h2.console.enabled=false
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0
spring.flyway.locations=classpath:db/migration
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB
# Render/Railway set PORT; default 8080 for local runs.
server.port=${PORT:8080}
# Where the static HTML lives (OAuth success/error redirects here). 
# When merged, this is the same as the backend URL.
app.frontend-base-url=${RENDER_EXTERNAL_URL:${APP_FRONTEND_BASE_URL:http://localhost:8080}}

spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${SPRING_MAIL_USERNAME:}
spring.mail.password=${SPRING_MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.requires=true
spring.mail.properties.mail.smtp.starttls.required=true

spring.mail.properties.mail.smtp.ssl.trust=smtp.gmail.com
# AI Assistant
app.ai.openrouter-api-key=${OPENROUTER_API_KEY:}
app.ai.openrouter-model=${OPENROUTER_MODEL:z-ai/glm-4.5-air:free}

# ZEGOCLOUD Video Calls
zegocloud.app-id=${ZEGOCLOUD_APP_ID:0}
zegocloud.server-secret=${ZEGOCLOUD_SERVER_SECRET:}
