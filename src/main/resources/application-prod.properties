# Activated with SPRING_PROFILES_ACTIVE=prod (Render / Railway / Docker production).
spring.application.name=virtual-office-system

# Render sets PORT; Railway may set PORT for web services.
server.port=${PORT:8080}

# Needed so OAuth redirects and links use HTTPS behind Render/Railway proxies.
server.forward-headers-strategy=framework

spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Optional explicit JDBC (overrides DATABASE_URL / PG*) when set — must begin with jdbc:postgresql:
# spring.datasource.url=
# spring.datasource.username=
# spring.datasource.password=

# DATABASE_URL parsing is implemented in ProdDataSourceConfig (postgres://...)
# Alternative: Railway-style PGHOST, PGPORT, PGDATABASE, PGUSER, PGPASSWORD.

# Hibernate creates/updates tables from entities. Existing Flyway SQL is H2-oriented; disable in prod.
spring.flyway.enabled=false
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

spring.h2.console.enabled=false

spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# Public URL of your static site (Netlify, Vercel, etc.) — OAuth success/error redirects + CORS reference.
app.frontend-base-url=${APP_FRONTEND_BASE_URL}

# SMTP — set in the platform dashboard (do not commit real secrets).
spring.mail.host=${SPRING_MAIL_HOST:smtp.gmail.com}
spring.mail.port=${SPRING_MAIL_PORT:587}
spring.mail.username=${SPRING_MAIL_USERNAME:}
spring.mail.password=${SPRING_MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.requires=true

spring.mail.properties.mail.smtp.ssl.trust=${SPRING_MAIL_SSL_TRUST:smtp.gmail.com}

# OAuth — configure in Google/GitHub consoles for https://YOUR-API-HOST/login/oauth2/code/google|github
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:}
spring.security.oauth2.client.registration.github.client-id=${GITHUB_CLIENT_ID:}
spring.security.oauth2.client.registration.github.client-secret=${GITHUB_CLIENT_SECRET:}

app.ai.openrouter-api-key=${OPENROUTER_API_KEY:}
app.ai.openrouter-model=${OPENROUTER_MODEL:z-ai/glm-4.5-air:free}

zegocloud.app-id=${ZEGOCLOUD_APP_ID:}
zegocloud.server-secret=${ZEGOCLOUD_SERVER_SECRET:}

management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never
management.endpoint.health.probes.enabled=true
