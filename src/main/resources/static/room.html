<script src="https://cdnjs.cloudflare.com/ajax/libs/sockjs-client/1.1.4/sockjs.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
<script src="https://unpkg.com/@zegocloud/zego-uikit-prebuilt/zego-uikit-prebuilt.js"></script>
<script>

    let stompClient = null;
    let stompSubscription = null;
    let connectedRoomId = null;
    let stompConnectInFlight = null;

    function getSelectedRoomId() {
        if (typeof currentRoom !== "number" || !rooms[currentRoom]) return null;
        return rooms[currentRoom].id ?? null;
    }

    function disconnectSocket() {
        if (stompSubscription) {
            stompSubscription.unsubscribe();
            stompSubscription = null;
        }

        if (stompClient && stompClient.connected) {
            stompClient.disconnect(() => {});
        }

        stompClient = null;
        connectedRoomId = null;
    }

    /** @returns {Promise<boolean>} */
    function connect(roomId) {
        if (!roomId) return Promise.resolve(false);
        if (connectedRoomId === roomId && stompClient?.connected) {
            return Promise.resolve(true);
        }
        if (stompConnectInFlight && stompConnectInFlight.roomId === roomId) {
            return stompConnectInFlight.promise;
        }

        disconnectSocket();

        let settleTimer;
        const promise = new Promise(function (resolve, reject) {
            settleTimer = setTimeout(function () {
                stompConnectInFlight = null;
                disconnectSocket();
                reject(new Error("Timed out waiting for chat (25s)"));
            }, 25000);

            let socket;
            try {
                socket = new SockJS(getBackendOrigin() + "/ws-office");
                stompClient = Stomp.over(socket);
                stompClient.debug = null;
            } catch (e) {
                clearTimeout(settleTimer);
                stompConnectInFlight = null;
                reject(e);
                return;
            }

            stompClient.connect(
                {},
                function () {
                    clearTimeout(settleTimer);
                    stompConnectInFlight = null;
                    connectedRoomId = roomId;
                    stompSubscription = stompClient.subscribe(
                        "/topic/room/" + roomId,
                        function (msg) {
                            const chatMessage = JSON.parse(msg.body);
                            void displayMessage(chatMessage);
                        },
                    );
                    resolve(true);
                },
                function (frame) {
                    clearTimeout(settleTimer);
                    stompConnectInFlight = null;
                    disconnectSocket();
                    var msg =
                        frame &&
                        (frame.headers && frame.headers.message
                            ? frame.headers.message
                            : frame.body);
                    reject(new Error(msg ? String(msg) : "WebSocket rejected"));
                },
            );
        });

        stompConnectInFlight = { roomId: roomId, promise: promise };
        return promise;
    }

    // بنحوّل الرسايل الجاية من الـ WebSocket لنفس شكل الـ UI الحالي
    async function displayMessage(chatMessage) {
        if (typeof currentRoom !== "number" || !rooms[currentRoom]) return;

        const selectedRoomId = getSelectedRoomId();
        if (selectedRoomId && chatMessage.roomId !== selectedRoomId) return;

        rooms[currentRoom].messages = rooms[currentRoom].messages || [];

        let nextMessage;
        if (chatMessage.type === "FILE") {
            const fileUrl = chatMessage.content?.startsWith("http")
                ? chatMessage.content
                : `${getBackendOrigin()}${chatMessage.content}`;

            if (chatMessage.fileType?.startsWith("image/")) {
                nextMessage = { type: "image", data: fileUrl, time: getTime12h(), senderName: chatMessage.senderName || "Unknown" };
            } else if (chatMessage.fileType?.startsWith("video/")) {
                nextMessage = { type: "video", data: fileUrl, time: getTime12h(), senderName: chatMessage.senderName || "Unknown" };
            } else if (chatMessage.fileType?.startsWith("audio/")) {
                nextMessage = { type: "audio", data: fileUrl, time: getTime12h(), senderName: chatMessage.senderName || "Unknown" };
            } else {
                nextMessage = { type: "file", name: chatMessage.fileName, data: fileUrl, time: getTime12h(), senderName: chatMessage.senderName || "Unknown" };
            }
        } else {
            nextMessage = {
                type: "text",
                data: chatMessage.content,
                time: getTime12h(),
                senderName: chatMessage.senderName || "Unknown"
            };
        }

        rooms[currentRoom].messages.push(nextMessage);

        saveAll();
        await renderMessages();
        updateRoomInfo();
    }

    window.addEventListener("beforeunload", disconnectSocket);

</script>
