<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Settings - Socum</title>
    <script>
        (function() {
            if (sessionStorage.getItem("authUser")) {
                document.documentElement.classList.add("logged-in");
            }
        })();
    </script>
    <style>
        .logged-in .login_button, 
        .logged-in .signup_button 
        {
            display: none !important;
        }
    </style>
    <link rel="stylesheet" href="CSS/master.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar">
    <div class="logo">
        <img src="images/logo.png">
    </div>

    <span class="Raf">RafiQ</span>

    <div class="nav-links">
                <a href="dashboard.html">Dashboard</a>
                <a href="main.html">Home</a>
                <a href="settings.html">Settings</a>
    </div>
</nav>



<!-- dark mode Start -->
                <div id="themeWidget" class="theme-widget">
        
                <span class="icon sun">
            <i class="fa-solid fa-sun"></i>
            </span>

            <label class="switch">
            <input type="checkbox" id="darkToggle">
            <span class="slider"></span>
            </label>

            <span class="icon moon">
            <i class="fa-solid fa-moon"></i>
            </span>

        </div>
        <!-- dark mode End -->



        
<!-- SETTINGS -->
<section class="settings-container">

    <h1> Settings</h1>

    

    <!-- NOTIFICATIONS -->
    <div class="settings-box">
        <h2> Notifications</h2>

        <div class="setting-item">
            <span>Email Notifications</span>
            <input type="checkbox">
        </div>

        <div class="setting-item">
            <span>Push Notifications</span>
            <input type="checkbox">
        </div>
    </div>

    <!-- SECURITY -->
    <div class="settings-box">
        <h2> Security</h2>

        <button class="btn" onclick="openChangePasswordPage()">Change Password</button>
        <button class="btn danger">Logout All Devices</button>
    </div>

    <!-- ACCOUNT -->
    <div class="settings-box">
        <h2> Account</h2>

        <button class="btn" onclick="window.location.href='profile.html'">Edit Profile</button>
        <button class="btn danger" onclick="deleteCurrentAccount()">Delete Account</button>
    </div>

</section>
<div id="toast-container"></div>

<script src="JS/rafiq-deploy-config.js"></script>
<script src="JS/master.js"></script>
</body>
</html>
