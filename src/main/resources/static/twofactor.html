<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Email Verification - RafiQ</title>
    <script>
    </script>
    <link rel="stylesheet" href="login_page/master.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
      /* OTP Card Styling - عرضي */
/* Container الأساسي */
/* Variables Integration */
:root { 
    --dark-bg: #1a1a1a; 
    --accent-yellow: #fdbd41; 
    --white-writable: #555; 
    --white-back: #eeeeee;
    --radius: 10px; 
    --transition: 0.3s ease; 
} 

[data-theme="dark"] {
    --dark-bg: #1a1a1a;
    --white-writable: #ffffff;
    --white-back: #1a1a1a;
    --accent-yellow: #064A60;
}

/* Layout الأساسي */
body {
    background-color: var(--accent-yellow); /* خلفية الصفحة بره البوكس */
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    margin: 0;
    transition: var(--transition);
}

.otp-card {
    display: flex;
    width: 900px;
    height: 540px;
    background: var(--white-back);
    border-radius: var(--radius);
    box-shadow: 0 20px 50px rgba(0,0,0,0.1);
    overflow: hidden;
    transition: var(--transition);
}


.otp-hero {
    flex: 0.7; 
    padding: 40px;
    display: flex;
    flex-direction: column;
    background: rgba(0,0,0,0.02); 
    border-right: 1px solid rgba(0,0,0,0.05);
}


.otp-hero img {
    height: 70px !important; 
    width: auto;            
    object-fit: contain;
    align-self: flex-start;  
    margin-bottom: 30px;    
}

.otp-hero h1 {
    position: static !important;
    font-size: 20px;
    color: var(--white-writable);
    margin-bottom: 15px;
    font-weight: 700;
}

.otp-hero p {
    font-size: 14px;
    color: var(--white-writable);
    opacity: 0.8;
    line-height: 1.6;
}


.otp-meta {
    margin-top: auto;
  
}

.otp-meta div {
    margin-bottom: 30px;
    
}

.otp-meta strong {
    display: block;
    font-size: 11px;
    color: var(--accent-yellow);
    text-transform: uppercase;
    letter-spacing: 1px;
    font-size: 20px;
}

.otp-meta p {
    font-size: 20px;
    color: var(--white-writable);
    font-weight: 600;
    margin: 0;
}


.otp-panel {
    flex: 1.3;
    padding: 60px 80px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    background: var(--white-back);
}

.otp-panel h2 {
    font-size: 26px;
    color: var(--white-writable);
    margin-bottom: 10px;
}

.otp-panel p#otpDescription {
    font-size: 15px;
    color: var(--white-writable);
    opacity: 0.7;
    margin-bottom: 30px;
}


.otp-panel .input-group {
    display: flex;
    align-items: center;
    border-bottom: 2px solid var(--accent-yellow);
    padding: 10px 0;
    margin-bottom: 40px;
}

.otp-panel .input-group i {
    font-size: 18px;
    color: var(--accent-yellow);
    margin-right: 15px;
}

#otpCode {
    border: none;
    background: transparent;
    outline: none;
    width: 100%;
    font-size: 22px;
    color: var(--white-writable);
    letter-spacing: 5px;
    font-weight: bold;
}

#otpCode::placeholder {
    letter-spacing: normal;
    color: var(--white-writable);
    opacity: 0.4;
    font-size: 16px;
}


#otpSubmitBtn {
    background: var(--accent-yellow);
    color: #fff;
    border: none;
    padding: 15px;
    border-radius: var(--radius);
    font-size: 16px;
    font-weight: bold;
    cursor: pointer;
    transition: var(--transition);
}

#otpSubmitBtn:hover {
    filter: brightness(1.1);
    transform: translateY(-2px);
}


.btn-secondary {
    background: none;
    border: none;
    color: var(--white-writable);
    margin-top: 20px;
    cursor: pointer;
    font-size: 14px;
    opacity: 0.6;
    text-decoration: underline;
}

.btn-secondary:hover {
    color: var(--accent-yellow);
    opacity: 1;
}

/* Status Text */
.status-text {
    height: 20px;
    font-size: 13px;
    margin-bottom: 10px;
    font-weight: 600;
}

/* Responsive */
@media (max-width: 800px) {
    .otp-card {
        flex-direction: column;
        width: 90%;
        height: auto;
    }
    .otp-hero, .otp-panel {
        padding: 30px;
    }
}
    </style>
</head>
<body class="login-page otp-page">
    <div id="themeWidget" class="theme-widget">
        <span class="icon sun"><i class="fa-solid fa-sun"></i></span>
        <label class="switch">
            <input type="checkbox" id="darkToggle">
            <span class="slider"></span>
        </label>
        <span class="icon moon"><i class="fa-solid fa-moon"></i></span>
    </div>

    <!-- صفحة OTP بسيطة وماشية مع نفس شكل صفحة اللوجين -->
    <div class="otp-card">
        <section class="otp-hero">
            <img src="images/logo.png" alt="RafiQ logo" style="height:44px; width:auto;">
            <div>
                <h1>Email Verification</h1>
                <p>We verified your main credentials. Enter the one-time code we sent to your email to finish signing in.</p>
            </div>
            <div class="otp-meta">
                <div>
                    <strong>User</strong>
                    <p id="otpUserName">-</p>
                </div>
                <div>
                    <strong>Sent to</strong>
                    <p id="otpDeliveryTarget">-</p>
                </div>
            </div>
        </section>

        <section class="otp-panel">
            <h2>Enter Your Login Code</h2>
            <p id="otpDescription">Check your inbox for the 5-digit verification code, then enter it below.</p>

            <div class="input-group" style="margin-top: 22px;">
                <i class="fa-solid fa-envelope-open-text"></i>
                <input type="text" id="otpCode" inputmode="numeric" maxlength="5" autocomplete="one-time-code" placeholder="Enter 5-digit code">
            </div>

            <div class="status-text" id="otpStatus"></div>

            <div class="otp-actions">
                <button type="button" class="btn-orange" id="otpSubmitBtn" onclick="submitEmailOtp()">Verify & Continue</button>
                <button type="button" class="btn-secondary" onclick="cancelEmailOtpFlow()">Back to Login</button>
            </div>
        </section>
    </div>
    <div id="toast-container"></div>
    <script src="JS/rafiq-deploy-config.js"></script>
    <script src="JS/master.js"></script>
</body>
</html>
