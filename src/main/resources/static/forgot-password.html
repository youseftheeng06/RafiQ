<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - RafiQ</title>
    <link rel="stylesheet" href="login_page/master.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
</head>
<body class="login-page auth-utility-page">
    <div id="themeWidget" class="theme-widget">
        <span class="icon sun"><i class="fa-solid fa-sun"></i></span>
        <label class="switch">
            <input type="checkbox" id="darkToggle">
            <span class="slider"></span>
        </label>
        <span class="icon moon"><i class="fa-solid fa-moon"></i></span>
    </div>

    <a href="login.html" class="home-btn auth-home-btn">
        <i class="fa-solid fa-arrow-left"></i>
    </a>

    <main class="auth-card">
        <div class="auth-card-head">
            <img src="images/logo.png" alt="RafiQ logo" class="auth-card-logo">
            <p class="auth-card-eyebrow">Password Recovery</p>
            <h1>Forgot your password?</h1>
            <p class="auth-card-copy">Enter your account email, verify the code we send, then choose a new password.</p>
        </div>

        <div class="auth-step-list">
            <div class="auth-step-item is-active" id="resetStepRequestBadge">1. Send code</div>
            <div class="auth-step-item" id="resetStepVerifyBadge">2. Verify code</div>
            <div class="auth-step-item" id="resetStepPasswordBadge">3. Set new password</div>
        </div>

        <section class="auth-panel" id="resetStepRequest">
            <div class="input-group">
                <i class="fa-regular fa-envelope"></i>
                <input type="email" id="resetEmail" placeholder="Account Email">
            </div>
            <button type="button" class="btn-orange auth-full-btn" id="resetRequestBtn" onclick="requestPasswordResetCode()">Send Reset Code</button>
        </section>

        <section class="auth-panel auth-panel-hidden" id="resetStepVerify">
            <div class="auth-info-box">
                We sent a 5-digit code to <strong id="resetDeliveryTarget">your email</strong>.
            </div>
            <div class="input-group">
                <i class="fa-solid fa-shield-halved"></i>
                <input type="text" id="resetOtpCode" placeholder="Reset Code" maxlength="5">
            </div>
            <button type="button" class="btn-orange auth-full-btn" id="resetVerifyBtn" onclick="verifyPasswordResetCode()">Verify Code</button>
        </section>

        <section class="auth-panel auth-panel-hidden" id="resetStepPassword">
            <div class="input-group">
                <i class="fa-solid fa-lock"></i>
                <input type="password" id="resetNewPassword" placeholder="New Password">
            </div>
            <div class="input-group">
                <i class="fa-solid fa-lock"></i>
                <input type="password" id="resetConfirmPassword" placeholder="Confirm New Password">
            </div>
            <button type="button" class="btn-orange auth-full-btn" id="resetSubmitBtn" onclick="submitForgotPasswordReset()">Update Password</button>
        </section>

        <p id="resetStatus" class="auth-status"></p>

        <div class="auth-footer-links">
            <a href="login.html">Back to sign in</a>
        </div>
    </main>
    <div id="toast-container"></div>
    <script src="JS/rafiq-deploy-config.js"></script>
    <script src="JS/master.js"></script>
</body>
</html>
