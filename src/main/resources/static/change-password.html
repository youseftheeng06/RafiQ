<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Change Password - RafiQ</title>
    <script>
        (function() {
            if (!sessionStorage.getItem("authUser")) {
                window.location.href = "login.html";
            }
        })();
    </script>
    <link rel="stylesheet" href="login_page/master.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
</head>
<body class="login-page auth-utility-page">
    <div id="themeWidget" class="theme-widget">
        <span class="icon sun"><i class="fa-solid fa-sun"></i></span>
        <label class="switch">
            <input type="checkbox" id="darkToggle">
            <span class="slider"></span>
        </label>
        <span class="icon moon"><i class="fa-solid fa-moon"></i></span>
    </div>

    <a href="settings.html" class="home-btn auth-home-btn">
        <i class="fa-solid fa-arrow-left"></i>
    </a>

    <main class="auth-card">
        <div class="auth-card-head">
            <img src="images/logo.png" alt="RafiQ logo" class="auth-card-logo">
            <p class="auth-card-eyebrow">Account Security</p>
            <h1>Change your password</h1>
            <p class="auth-card-copy">Use your current password once, then set a stronger new one for your account.</p>
        </div>

        <div class="auth-info-box">
            Signed in as <strong id="changePasswordEmail">your account</strong>
        </div>

        <section class="auth-panel">
            <div class="input-group">
                <i class="fa-solid fa-lock"></i>
                <input type="password" id="currentPassword" placeholder="Current Password">
            </div>
            <div class="input-group">
                <i class="fa-solid fa-lock"></i>
                <input type="password" id="newPassword" placeholder="New Password">
            </div>
            <div class="input-group">
                <i class="fa-solid fa-lock"></i>
                <input type="password" id="confirmNewPassword" placeholder="Confirm New Password">
            </div>
            <button type="button" class="btn-orange auth-full-btn" id="changePasswordBtn" onclick="submitChangePassword()">Save New Password</button>
        </section>

        <p id="changePasswordStatus" class="auth-status"></p>

        <div class="auth-footer-links">
            <a href="settings.html">Back to settings</a>
        </div>
    </main>
    <div id="toast-container"></div>

    <script src="JS/rafiq-deploy-config.js"></script>
    <script src="JS/master.js"></script>
</body>
</html>
