    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">

<body>

<!-- ================= NAVBAR ================= -->
<nav class="navbar">

        <img src="images/logo.png">
    </div>

    <span class="Raf">RafiQ</span>

    <div class="nav-links">
        <a href="dashboard.html">Dashboard</a>

<!-- ================= DARK MODE ================= -->
<div id="themeWidget" class="theme-widget">

    <span class="icon sun">
        <i class="fa-solid fa-sun"></i>
    </span>

    <label class="switch">
        <input type="checkbox" id="darkToggle">
        <span class="slider"></span>
    </label>

    <span class="icon moon">
        <i class="fa-solid fa-moon"></i>
    </span>

</div>


<!-- ================= APP ================= -->
<div class="app">

    <!-- SIDEBAR -->
    <div class="rooms-sidebar">

        <h2>Rooms</h2>

        <input type="text" placeholder="Search rooms..." id="searchInput">

        <div class="room-list" id="roomList"></div>

        <button class="add-room manager-only" onclick="addRoom()">+ Add Room</button>

    </div>


    <!-- MAIN CHAT -->
    <div class="main">

        <!-- TOP BAR -->
        <div class="topbar">

            <h2 id="roomTitle">Select a room</h2>

            <button class="call-btn" onclick="startCall()">
                <i class="fa-solid fa-video"></i> Call
            </button>

        </div>


        <!-- CHAT BOX -->
        <div class="chat-box" id="chatBox"></div>

        <div class="input-box">

            <!-- file upload -->
            <input type="file" id="fileInput" hidden onchange="handleFile(event)">

            <button class="icon-btn" onclick="document.getElementById('fileInput').click()">
                <i class="fa-solid fa-paperclip"></i>
            </button>

          

            <!-- message input -->
            <input type="text" id="msgInput" placeholder="Type message...">

              <!-- VOICE RECORD BUTTON -->
                <button class="icon-btn vm-record-btn" id="recordBtn">
                    <i class="fa-solid fa-microphone"></i>
                </button>
                
            <!-- send -->
            <button onclick="sendMessage()">Send</button>

        </div>

    </div>


    <!-- RIGHT PANEL -->
 <div class="right">

    <h3 id="activeRoomName">No room selected</h3>

    <div class="room-stats">
        <p>Messages: <span id="msgCount">0</span></p>
    </div>

    <div class="room-members">
        <h4>Members</h4>
        <div class="member-actions">
            <button class="btn" onclick="promptAddMember()">Add Member</button>
            <button class="btn" onclick="loadRoomMembers()">Refresh</button>
        </div>
        <ul id="memberList">
            <li>No members</li>
        </ul>
    </div>

    <button onclick="clearChat()" class="btn danger">
        Clear Chat
    </button>

</div>

<!-- الكونتينر الخاص بمكالمة الفيديو على كامل الشاشة -->
<div id="zegoCallOverlay" style="display:none; position:fixed; inset:0; background:#0b1220; z-index:9999;">
    <div id="zegoCallRoot" style="width:100%; height:100%;"></div>
</div>



<!-- ================= SCRIPT ================= -->
<script src="JS/master.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/sockjs-client/1.1.4/sockjs.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
<script src="https://unpkg.com/@zegocloud/zego-uikit-prebuilt/zego-uikit-prebuilt.js"></script>
<script>

    let stompClient = null;
    let stompSubscription = null;
    let connectedRoomId = null;

    function getSelectedRoomId() {
        if (typeof currentRoom !== "number" || !rooms[currentRoom]) return null;
        return rooms[currentRoom].id ?? null;
    }

    function disconnectSocket() {
        if (stompSubscription) {
            stompSubscription.unsubscribe();
            stompSubscription = null;
        }

        if (stompClient && stompClient.connected) {
            stompClient.disconnect(() => {});
        }

        stompClient = null;
        connectedRoomId = null;
    }

    function connect(roomId) {
        if (!roomId) return;
        if (connectedRoomId === roomId && stompClient?.connected) return;

        disconnectSocket();

        const socket = new SockJS('http://localhost:8080/ws-office');
        stompClient = Stomp.over(socket);
        stompClient.debug = null;

        stompClient.connect({}, function () {
            connectedRoomId = roomId;
            stompSubscription = stompClient.subscribe('/topic/room/' + roomId, function (msg) {
                const chatMessage = JSON.parse(msg.body);
                displayMessage(chatMessage);
            });
        });
    }

    // بنحوّل الرسايل الجاية من الـ WebSocket لنفس شكل الـ UI الحالي
    function displayMessage(chatMessage) {
        if (typeof currentRoom !== "number" || !rooms[currentRoom]) return;

        const selectedRoomId = getSelectedRoomId();
        if (selectedRoomId && chatMessage.roomId !== selectedRoomId) return;

        rooms[currentRoom].messages = rooms[currentRoom].messages || [];

        rooms[currentRoom].messages.push({
            type: "text",
            data: chatMessage.content,
            time: getTime12h(),
            senderName: chatMessage.senderName || "Unknown"
        });

        saveAll();
        renderMessages();
        updateRoomInfo();
    }

    window.addEventListener("beforeunload", disconnectSocket);

</script>
<audio id="ringtone" src="images/WhatsApp Ptt 2026-04-01 at 8.35.48 PM.ogg" preload="auto"></audio>
</body>
</html>
