<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Tasks - Socum</title>
    <script>
        (function() {
            if (sessionStorage.getItem("authUser")) {
                document.documentElement.classList.add("logged-in");
            }
        })();
    </script>
    <style>
        .logged-in .login_button,
        .logged-in .signup_button { display: none !important; }

        .task-input { display:flex; flex-wrap:wrap; gap:10px; margin-bottom:20px; }
        .task-input input { flex:1 1 180px; padding:8px 12px; border-radius:8px; border:1px solid #ccc; font-size:14px; }
        .task-input button { padding:8px 20px; background:#f5a623; border:none; border-radius:8px; color:#fff; font-weight:bold; cursor:pointer; }

        #taskList { list-style:none; padding:0; }
        .task-item { background:var(--card-bg,#fff); border-radius:10px; padding:14px 18px; margin-bottom:12px; box-shadow:0 2px 8px rgba(0,0,0,.08); display:flex; justify-content:space-between; align-items:flex-start; gap:10px; }
        .task-item.done { opacity:.55; text-decoration:line-through; }
        .task-item h3 { margin:0 0 4px; font-size:15px; }
        .task-item p  { margin:0 0 4px; font-size:13px; color:#666; }
        .task-item small { font-size:12px; color:#999; }
        .task-actions { display:flex; flex-direction:column; gap:6px; min-width:80px; }
        .done-btn   { background:#4caf50; color:#fff; border:none; border-radius:6px; padding:5px 10px; cursor:pointer; font-size:12px; }
        .remove-btn { background:#e53935; color:#fff; border:none; border-radius:6px; padding:5px 10px; cursor:pointer; font-size:12px; }
        .task-badge { display:inline-block; font-size:11px; padding:2px 8px; border-radius:20px; margin-top:4px; }
        .badge-pending   { background:#fff3e0; color:#e65100; }
        .badge-completed { background:#e8f5e9; color:#2e7d32; }
        .badge-in_progress { background:#e3f2fd; color:#1565c0; }
        .task-from { font-size:11px; color:#aaa; margin-top:3px; }

        .complete-checkbox-wrap { display:flex; align-items:center; gap:6px; margin-top:6px; }
        .complete-checkbox-wrap input[type=checkbox] { width:16px; height:16px; cursor:pointer; accent-color:#4caf50; }
        .complete-checkbox-wrap label { font-size:13px; cursor:pointer; }

        .notifications-panel { margin-top:32px; background:var(--card-bg,#fff); border-radius:12px; padding:20px; box-shadow:0 2px 10px rgba(0,0,0,.08); }
        .notifications-panel h2 { margin:0 0 16px; font-size:18px; }
        .notification-item { border-left:4px solid #f5a623; padding:10px 14px; margin-bottom:10px; border-radius:0 8px 8px 0; background:var(--input-bg,#f9f9f9); position:relative; }
        .notification-item.unread { border-left-color:#2196f3; background:#e3f2fd22; }
        .notification-item strong { display:block; font-size:14px; margin-bottom:3px; }
        .notification-item p { margin:0; font-size:13px; color:#555; }
        .notif-time { font-size:11px; color:#aaa; margin-top:4px; }
        .mark-read-btn { position:absolute; top:10px; right:10px; background:none; border:1px solid #ccc; border-radius:5px; padding:2px 8px; font-size:11px; cursor:pointer; color:#888; }
        .mark-read-btn:hover { background:#eee; }
    </style>
    <link rel="stylesheet" href="CSS/master.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
</head>
<body>

<nav class="navbar">
    <div class="logo"><img src="images/logo.png"></div>
    <span class="Raf">RafiQ</span>
    <div class="nav-links">
        <a href="dashboard.html">Dashboard</a>
        <a href="main.html">Home</a>
        <a href="about.html">About</a>
        <a href="features.html">Features</a>
        <a href="settings.html">Settings</a>
    </div>
    <a href="login.html" class="login_button">Login</a>
    <a href="login.html" class="signup_button">Sign Up</a>
</nav>

<div id="themeWidget" class="theme-widget">
    <span class="icon sun"><i class="fa-solid fa-sun"></i></span>
    <label class="switch">
        <input type="checkbox" id="darkToggle">
        <span class="slider"></span>
    </label>
    <span class="icon moon"><i class="fa-solid fa-moon"></i></span>
</div>

<section class="tasks-container">
    <h1>Tasks</h1>

    <div class="task-input">
        <input id="taskTitle"           placeholder="Title">
        <input id="taskDesc"            placeholder="Description">
        <input id="taskAssigneeStaffId" placeholder="Assign to Staff ID">
        <input id="taskDeadline" type="datetime-local" step="1">
        <button onclick="addTask()">Add Task</button>
    </div>

    <ul id="taskList"></ul>

    <section class="notifications-panel">
        <h2>Notifications</h2>
        <div id="notificationList"><p>Loading</p></div>
    </section>
</section>

<script src="https://cdnjs.cloudflare.com/ajax/libs/sockjs-client/1.1.4/sockjs.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
<script src="JS/master.js"></script>
</body>
</html>
