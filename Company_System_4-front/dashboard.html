<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dashboard - Socum</title>
    <script>
        (function() {
            if (sessionStorage.getItem("authUser")) {
                document.documentElement.classList.add("logged-in");
            }
        })();
    </script>
    <style>
        .logged-in .login_button, 
        .logged-in .signup_button 
        {
            display: none !important;
        }
    </style>
    <link rel="stylesheet" href="CSS/master.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar">

    <div class="logo">
        <img src="images/logo.png">
    </div>
    <span class="Raf">RafiQ</span>
    <div class="nav-links">
        <a href="dashboard.html">Dashboard</a>
        <a href="main.html">Home</a>
        <a href="room.html">Rooms</a>
        <a href="tasks.html">Tasks</a>
        <a href="employees.html">Employees</a>
        <a href="settings.html">Settings</a>
    </div>

    <a href="login.html" class="login_button">Login</a>
    <a href="login.html" class="signup_button">Sign Up</a>

</nav>



<!-- dark mode Start -->
                <div id="themeWidget" class="theme-widget">
        
                <span class="icon sun">
            <i class="fa-solid fa-sun"></i>
            </span>

            <label class="switch">
            <input type="checkbox" id="darkToggle">
            <span class="slider"></span>
            </label>

            <span class="icon moon">
            <i class="fa-solid fa-moon"></i>
            </span>

        </div>
        <!-- dark mode End -->



        
<!-- DASHBOARD CONTENT -->
<section class="dashboard-container">

    <h1>Dashboard</h1>
    <p>Welcome back! Here’s an overview of your system.</p>

    <div class="dashboard-stats">

                <div class="stat-box">
            <h3>Total Tasks</h3>
            <p id="totalTasks">0</p>
        </div>

                <div class="stat-box">
            <h3>Completed</h3>
            <p id="completedTasks">0</p>
        </div>

                <div class="stat-box" id="employeesStat">
            <h3>Employees</h3>
            <p id="totalEmployees">0</p>
        </div>

    </div>

    <section class="notifications-panel">
        <h2>Notifications</h2>
        <div id="notificationList"></div>
    </section>

</section>

<script src="https://cdnjs.cloudflare.com/ajax/libs/sockjs-client/1.1.4/sockjs.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
<script src="JS/master.js"></script>
</body>

</html>
