# Optional Render Blueprint — place in repo root or adjust paths when importing.
# https://render.com/docs/blueprint-spec
services:
  - type: web
    name: rafiq-virtual-office-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /actuator/health
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: APP_FRONTEND_BASE_URL
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GITHUB_CLIENT_ID
        sync: false
      - key: GITHUB_CLIENT_SECRET
        sync: false
      - key: SPRING_MAIL_USERNAME
        sync: false
      - key: SPRING_MAIL_PASSWORD
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: ZEGOCLOUD_APP_ID
        sync: false
      - key: ZEGOCLOUD_SERVER_SECRET
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: rafiq-postgres
          property: connectionString

databases:
  - name: rafiq-postgres
    databaseName: rafiq
    user: rafiq
